version: "3.9"

services:

  # ── MongoDB (Optional - Use MongoDB Atlas in production) ────────────────────────────────────────
  # Uncomment this section if you want to use local MongoDB instead of MongoDB Atlas
  # mongodb:
  #   image: mongo:7
  #   container_name: foodbank-mongodb
  #   ports:
  #     - "27017:27017"
  #   volumes:
  #     - mongodb_data:/data/db
  #   environment:
  #     MONGO_INITDB_DATABASE: foodbank
  #   restart: unless-stopped

  # ── Python AI Microservices ────────────────────────────────────
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: foodbank-ai
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
    restart: unless-stopped

  # ── Node.js Backend ────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: foodbank-backend
    ports:
      - "8080:8080"
    environment:
      MONGODB_URI: mongodb+srv://username:password@cluster.mongodb.net/foodbank?retryWrites=true&w=majority
      AI_BASE_URL: http://ai-services:5001
      NODE_ENV: production
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - ai-services
    restart: unless-stopped

  # ── React Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: foodbank-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
