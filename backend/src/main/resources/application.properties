# ─── Server ───────────────────────────────────────────────────
server.port=8080

# ─── PostgreSQL ───────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/foodbank
spring.datasource.username=foodbank_user
spring.datasource.password=foodbank_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────
app.jwt.secret=SmartFoodBank2024_SuperSecretKey_MustBe256BitsLong!1234
app.jwt.expiration-ms=86400000

# ─── AI Microservice ──────────────────────────────────────────
app.ai.base-url=http://localhost:5001

# ─── File Upload ──────────────────────────────────────────────
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads

# ─── Logging ──────────────────────────────────────────────────
logging.level.com.foodbank=DEBUG
logging.level.org.springframework.security=WARN
